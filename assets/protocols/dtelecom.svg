                    :root {
                        --border-color: #e0e0e0;
                        --hover-color: #2470FF;
                        --dtelecom-bg: #33CC66;
                    }
                }

                #container {
                    box-sizing: border-box;
                    border: 1px solid var(--border-color);
                    border-radius: 8px;
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                    display: flex;
                    align-items: center;
                    justify-content: center;
